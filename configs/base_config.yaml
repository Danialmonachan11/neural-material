# Base configuration for ControlDiff training

model:
  unet:
    in_channels: 4
    out_channels: 4
    block_out_channels: [320, 640, 1280, 1280]
    layers_per_block: 2
    attention_head_dim: 8
    cross_attention_dim: 768
    dropout: 0.0

  vae:
    in_channels: 3
    out_channels: 3
    latent_channels: 4
    block_out_channels: [128, 256, 512, 512]
    layers_per_block: 2
    scaling_factor: 0.18215

  diffusion:
    num_train_timesteps: 1000
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: 'scaled_linear'
    scheduler_type: 'ddpm'

training:
  batch_size: 4
  num_epochs: 100
  learning_rate: 1.0e-4
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_weight_decay: 0.01
  adam_epsilon: 1.0e-8

  lr_scheduler:
    type: 'cosine'
    warmup_steps: 500
    num_training_steps: 100000

  mixed_precision: 'fp16'
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0

  use_ema: true
  ema_decay: 0.9999

  log_every_n_steps: 10
  save_every_n_steps: 1000
  validate_every_n_steps: 500

data:
  train_data_dir: 'data/train'
  val_data_dir: 'data/val'
  image_size: 512
  center_crop: true
  random_flip: true
  num_workers: 4

distributed:
  backend: 'nccl'
  find_unused_parameters: false

logging:
  use_wandb: true
  wandb_project: 'controldiff'
  wandb_entity: null
  output_dir: 'outputs'
  log_with: ['wandb', 'tensorboard']

seed: 42
