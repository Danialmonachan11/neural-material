# Configuration for LoRA fine-tuning

# Inherit from base config
defaults:
  - base_config

# Override for LoRA
lora:
  rank: 8
  alpha: 16.0
  target_modules:
    - 'to_q'
    - 'to_k'
    - 'to_v'
    - 'to_out.0'
  dropout: 0.0

training:
  # Lower learning rate for fine-tuning
  learning_rate: 5.0e-5
  batch_size: 8
  num_epochs: 50
  gradient_accumulation_steps: 2

  # More frequent saving for fine-tuning
  save_every_n_steps: 500

  # Load pretrained model
  pretrained_model_path: 'checkpoints/base_model.pt'

logging:
  output_dir: 'outputs/lora_finetune'
  wandb_project: 'controldiff-lora'
